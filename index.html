                        alert(`성공적으로 저장되었습니다.\n저장 경로: ${res.path}`);
                    } else if (res && res.error) {
                        alert(`저장 중 오류가 발생했습니다: ${res.error}`);
                    }
                } else {
                    alert("로컬 데스크톱 API가 연결되지 않았습니다 (브라우저 모드).");
                }
            });
        });

        // 전체 내용 저장 처리
        btnSaveAll.addEventListener('click', async () => {
            const srcText = getPanelText('source').trim();
            const transText = getPanelText('translation').trim();
            const sumText = getPanelText('summary').trim();

            if (!srcText || !transText || !sumText) {
                alert("세 창에 모두 텍스트가 있어야 전체 저장을 수행할 수 있습니다.");
                return;
            }

            // 통합 저장 포맷 구성 (세 패널 전체 데이터 + 셀 구분)
            const combinedContent = `=== SOURCE TEXT ===\n${srcText}\n\n\n=== TRANSLATION TEXT ===\n${transText}\n\n\n=== SUMMARY TEXT ===\n${sumText}`;

            if (window.pywebview && window.pywebview.api) {
                const defaultName = `triple_project.txt`;
                const res = await window.pywebview.api.save_file_dialog(defaultName, combinedContent);
                if (res && res.success) {
                    alert(`전체 내용이 성공적으로 저장되었습니다.\n저장 경로: ${res.path}`);
                } else if (res && res.error) {
                    alert(`저장 중 오류가 발생했습니다: ${res.error}`);
                }
            } else {
                alert("로컬 데스크톱 API가 연결되지 않았습니다 (브라우저 모드).");
            }
        });

        // Triple 프로젝트 통합 백업 파일 파싱 및 복원
        function loadTripleProjectFile(fileContent) {
            const normalizedContent = fileContent.replace(/\r\n/g, '\n');
            
            const sourceMarker = "=== SOURCE TEXT ===\n";
            const translationMarker = "=== TRANSLATION TEXT ===\n";
            const summaryMarker = "=== SUMMARY TEXT ===\n";
            
            const srcIndex = normalizedContent.indexOf(sourceMarker);
            const transIndex = normalizedContent.indexOf(translationMarker);
            const sumIndex = normalizedContent.indexOf(summaryMarker);
            
            if (srcIndex === -1 || transIndex === -1 || sumIndex === -1) {
                alert("선택한 파일은 올바른 Triple 프로젝트 통합 백업 파일이 아닙니다.");
                return;
            }
            
            const srcStart = srcIndex + sourceMarker.length;
            const transStart = transIndex + translationMarker.length;
            const sumStart = sumIndex + summaryMarker.length;
            
            const markers = [
                { type: 'source', start: srcIndex, contentStart: srcStart },
                { type: 'translation', start: transIndex, contentStart: transStart },
                { type: 'summary', start: sumIndex, contentStart: sumStart }
            ].sort((a, b) => a.start - b.start);
            
            const parsedData = {};
            for (let i = 0; i < markers.length; i++) {
                const current = markers[i];
                const next = markers[i + 1];
                
                let sectionText = "";
                if (next) {
                    sectionText = normalizedContent.substring(current.contentStart, next.start);
                } else {
                    sectionText = normalizedContent.substring(current.contentStart);
                }
                
                parsedData[current.type] = sectionText.trim();
            }
            
            // 세션 구분선(\n\n\n)을 기준으로 단락 복제
            const srcCells = parsedData.source.split(/(?:\n[ \t]*){3,}/);
            const transCells = parsedData.translation.split(/(?:\n[ \t]*){3,}/);
            const sumCells = parsedData.summary.split(/(?:\n[ \t]*){3,}/);
            
            const maxCellCount = Math.max(srcCells.length, transCells.length, sumCells.length);
            
            // 모든 패널의 기존 DOM을 비우고 통합 파일의 인덱스 매칭 구조로 생성
            Object.keys(panels).forEach(key => {
                const container = panels[key].container;
                if (!container) return;
                
                container.innerHTML = '';
                
                let targetCells = [];
                if (key === 'source') targetCells = srcCells;
                else if (key === 'translation') targetCells = transCells;
                else if (key === 'summary') targetCells = sumCells;
                
                for (let idx = 0; idx < maxCellCount; idx++) {
                    const content = (idx < targetCells.length) ? targetCells[idx] : "";
                    const row = createBlockRowDom(key, idx, content);
                    container.appendChild(row);
                }
                
                updateMarkdownPreview(key);
            });
            
            reindexAllBlocks();
            syncBlockHeights();
            
            alert("📂 Triple 백업 파일로부터 세 탭의 데이터를 완벽하게 불러와 복원했습니다!");
        }

        // 'Triple 불러오기' 파일 탐색기 연동 이벤트
        const btnLoadProject = document.getElementById('btn-load-project');
        if (btnLoadProject) {
            btnLoadProject.addEventListener('click', () => {
                const input = document.createElement('input');
                input.type = 'file';
                input.accept = '.txt,.md';
                input.onchange = e => {
                    const file = e.target.files[0];
                    if (!file) return;
                    
                    const reader = new FileReader();
                    reader.onload = event => {
                        loadTripleProjectFile(event.target.result);
                    };
                    reader.readAsText(file, 'UTF-8');
                };
                input.click();
            });
        }

        // 초기 구동 및 빈 텍스트 초기화 블록 세팅
        Object.keys(panels).forEach(panelKey => {
            setPanelText(panelKey, "");
        });

    </script>
</body>
</html>
